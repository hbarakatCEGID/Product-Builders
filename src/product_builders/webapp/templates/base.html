<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title }}{% endblock %} · Product Builders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a href="/" class="brand">Product Builders</a>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/docs">Docs</a>
        <a href="/products">Catalog</a>
        <a href="/operations">Operations</a>
        <a href="/download">Install CLI</a>
        <a href="/api/docs" class="nav-muted">API</a>
      </nav>
    </div>
  </header>
  <main class="wrap main">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span>v{{ version }}</span>
      <span class="footer-dot">·</span>
      <span>Cursor rules &amp; governance from your repo</span>
    </div>
  </footer>
</body>
</html>
